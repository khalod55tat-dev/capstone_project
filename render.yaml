services:
  - type: web
    name: water-quality-analysis
    env: python
    region: oregon
    buildCommand: |
      mkdir -p models static templates migrations
      pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: water_quality_db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: GUNICORN_CMD_ARGS
        value: "--bind=0.0.0.0:$PORT --workers=4"
    disk:
      name: water-quality-data
      mountPath: /opt/render/project/src
      directories:
        - path: models
          description: ML model files
        - path: static
          description: Static files
        - path: templates
          description: HTML templates
        - path: migrations
          description: Database migrations
        - path: __pycache__
          description: Python cache files

databases:
  - name: water_quality_db
    databaseName: water_quality
    plan: free
    region: oregon 
